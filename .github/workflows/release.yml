name: Release
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PACKAGE_JSON_PATH: package.json
  CLI_CSPROJ_PATH: Tools~/UniCortex.Cli/UniCortex.Cli.csproj
  NUGET_SOURCE_URL: https://api.nuget.org/v3/index.json
  GITHUB_BOT_NAME: github-actions[bot]
  GITHUB_BOT_EMAIL: github-actions[bot]@users.noreply.github.com

jobs:
  paths-filter:
    name: Paths Filter
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      package_json: ${{ steps.filter.outputs.package_json }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            package_json:
              - ${{ env.PACKAGE_JSON_PATH }}

  update-draft:
    name: Update Draft
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main') || github.event_name == 'workflow_dispatch'}}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        id: release-drafter
        with:
          commitish: main

  update-files:
    name: Update Files
    needs: update-draft
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true
    env:
      VERSION: ${{ needs.update-draft.outputs.tag_name }}
      SOURCE_BRANCH: github-actions/update-files/${{ github.run_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Update versioned files
        run: |
          json_content=$(cat "${PACKAGE_JSON_PATH}")
          updated_json=$(echo "${json_content}" | jq --arg version "${VERSION}" '.version = $version')
          echo "${updated_json}" | jq '.' > "${PACKAGE_JSON_PATH}"

          sed -i "s#<PackageVersion>.*</PackageVersion>#<PackageVersion>${VERSION}</PackageVersion>#" "${CLI_CSPROJ_PATH}"
      - name: Commit versioned files
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        id: commit-versioned-files
        with:
          author_name: ${{ env.GITHUB_BOT_NAME }}
          author_email: ${{ env.GITHUB_BOT_EMAIL }}
          message: "Update release version files"
          add: "${{ env.PACKAGE_JSON_PATH }} ${{ env.CLI_CSPROJ_PATH }}"
          new_branch: ${{ env.SOURCE_BRANCH }}
      - name: Update README.md
        run: |
          cp -f .github/DRAFT_README.md README.md
      - name: Commit README.md
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        id: commit-readme
        with:
          author_name: ${{ env.GITHUB_BOT_NAME }}
          author_email: ${{ env.GITHUB_BOT_EMAIL }}
          message: "Update README.md"
          add: "README.md"
          new_branch: ${{ env.SOURCE_BRANCH }}
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        id: create-github-app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Create pull request and merge
        if: ${{ steps.commit-versioned-files.outputs.committed == 'true' || steps.commit-readme.outputs.committed == 'true' }}
        env:
          GH_TOKEN: ${{ steps.create-github-app-token.outputs.token }}
        run: |
          gh pr create --title "Update files for release" --body "Update files for release" --base main --head "${SOURCE_BRANCH}"
          gh pr merge "${SOURCE_BRANCH}" --auto --merge

  release:
    name: Release
    needs: [update-draft, paths-filter]
    environment: Release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged && needs.paths-filter.outputs.package_json == 'true' }}
    env:
      VERSION: ${{ needs.update-draft.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        id: create-github-app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ steps.create-github-app-token.outputs.token }}
      - name: Validate versioned files
        run: |
          package_version=$(jq -r '.version' "${PACKAGE_JSON_PATH}")
          if [[ "${package_version}" != "${VERSION}" ]]; then
            echo "::error::version in package.json (${package_version}) does not match the release draft tag (${VERSION})"
            exit 1
          fi

          csproj_version=$(sed -n 's#.*<PackageVersion>\\(.*\\)</PackageVersion>.*#\\1#p' "${CLI_CSPROJ_PATH}")
          if [[ "${csproj_version}" != "${VERSION}" ]]; then
            echo "::error::version in ${CLI_CSPROJ_PATH} (${csproj_version}) does not match the release draft tag (${VERSION})"
            exit 1
          fi
      - name: Pack CLI tool package
        run: |
          dotnet pack "${CLI_CSPROJ_PATH}" --configuration Release --output ./artifacts/cli-tool
      - name: Publish CLI tool package to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/cli-tool/*.nupkg \
            --api-key "${NUGET_API_KEY}" \
            --source "${NUGET_SOURCE_URL}" \
            --skip-duplicate
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        id: release-drafter
        with:
          publish: true
          commitish: main
      - name: Get semver
        id: get-semver
        run: |
          read -r major minor patch <<< "$(echo "${VERSION}" | grep -oE '^([0-9]+)\.([0-9]+)\.([0-9]+)' | awk -F '.' '{print $1 " " $2 " " $3}')"
          {
            echo "major=${major}"
            echo "minor=${major}.${minor}"
            echo "patch=${major}.${minor}.${patch}"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.VERSION }}
      - name: Update major tag
        if: steps.get-semver.outputs.major != '0'
        run: |
          git push -f origin "refs/tags/${{ env.VERSION }}:refs/tags/${{ steps.get-semver.outputs.major }}"
      - name: Update minor tag
        run: |
          git push -f origin "refs/tags/${{ env.VERSION }}:refs/tags/${{ steps.get-semver.outputs.minor }}"
